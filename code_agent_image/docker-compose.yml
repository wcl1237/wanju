version: '3.8'

services:
  code-agent:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - ./workspace:/workspace
    environment:
      - PORT=8765
      - WORKSPACE_DIR=/workspace
      - AI_API_KEY=${AI_API_KEY}
      - AI_API_BASE=${AI_API_BASE}
      - AI_MODEL=${AI_MODEL:-qwen-plus}
      - LOG_LEVEL=info
      - NODE_ENV=development
    restart: unless-stopped
